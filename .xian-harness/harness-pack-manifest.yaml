packLayers:
  core:
    description: 默认 governed-lite 主路径资产；安装在 base 中，但只承担轻量路由、状态、验证、门禁、关闭和 pack 状态入口。
    skills:
      - using-xian-harness
      - xian-open
      - xian-next
      - xian-project-status
      - xian-backlog
      - xian-verify
      - xian-gate
      - xian-commit
      - xian-pack-governance
  advanced-governance:
    description: 可选治理扩展资产；用于需求、设计、计划、实现、复盘、批量目标、经验沉淀和专项资产治理，不属于默认主路径。
    skills:
      - xian-batch
      - xian-spec
      - xian-design
      - xian-plan
      - xian-build
      - xian-diagnose
      - xian-project-startup
      - xian-project-sync
      - xian-project-research
      - xian-review
      - xian-cost
      - xian-experience
      - xian-asset-governance
      - xian-skill-governance
      - xian-hook-governance
      - xian-agent-governance
  audit:
    description: 显式 audit closeout 资产；用于 Workbench、人读审计视图、release/archive 证据包和高风险收口。
    skills:
      - xian-workbench
      - xian-archive
  profile:
    description: 垂直 profile 资产层；默认 base 不激活，只有目标项目选择对应 profile 时安装。
    skillGroups:
      - ruoyi
      - ruoyi-native
provenance:
  skillGroups:
    governance:
      origin: xian-agent-harness
      role: generic-governance
      description: xian 通用 Harness 治理 skills，负责协议、计划、验证、门禁、Workbench 和归档。
    experience-governance:
      origin: xian-agent-harness
      role: generic-experience-asset-governance
      description: xian 通用经验治理和分类型资产治理 skills，负责经验候选、资产分类、skill/hook/agent/pack 专项治理和 profile 隔离审查。
    ruoyi:
      origin: xian-agent-harness
      role: ruoyi-adapter
      description: xian 针对 RuoYi Plus UniApp / Java Web CRUD 场景沉淀的垂直适配 skills。
    ruoyi-native:
      origin: references/ruoyi-plus-uniapp/.codex/skills
      role: upstream-ruoyi-codex
      description: 从 RuoYi Plus UniApp 参考工程吸收的原生 Codex skills，作为 Java Web 企业开发经验来源。
      sourceSnapshot:
        type: git
        repository: references/ruoyi-plus-uniapp
        commit: 65e862d0a8e4
        fullCommit: 65e862d0a8e4be46d6547fa0cc54654d316d9f3e
        skillPath: .codex/skills
        dirty: false
