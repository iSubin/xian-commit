# Legacy compatibility aliases. These root templates stay installable for older
# pack consumers, but they are not the authoritative protocol registry.
templates:
  requirement: .xian-harness/protocol/templates/requirement.md
  tasks: .xian-harness/protocol/templates/tasks.md
  projectStatus: .xian-harness/protocol/templates/project-status.md
  acceptanceCriteria: .xian-harness/protocol/templates/acceptance-criteria.md
  verifyReport: .xian-harness/protocol/templates/verify-report.md
  qualityGateReport: .xian-harness/protocol/templates/quality-gate-report.md
  workbenchSnapshot: .xian-harness/protocol/templates/workbench-snapshot.md
  workbenchHtml: docs/xian-harness/workbench/{change-id}/index.html
  deliveryNote: .xian-harness/protocol/templates/delivery-note.md
lifecycleContract:
  change:
    kind: change-lifecycle
    ownerSkill: xian-pack-governance
    stateFile: docs/xian-harness/changes/{change-id}/.change-state.json
    transitionLog: docs/xian-harness/changes/{change-id}/.change-transition.log
    phases:
      - open
      - spec
      - plan
      - build
      - verify
      - archived
    guardActions:
      build:
        exitPhase: build
        command: xian-harness guard {change-id} --target <target-project> --for build --json
        evidencePath: docs/xian-harness/changes/{change-id}/.change-state.json
      verify:
        exitPhase: verify
        command: xian-harness guard {change-id} --target <target-project> --for verify --json
        evidencePath: docs/xian-harness/changes/{change-id}/verify/verify-result.json
      gate:
        exitPhase: verify
        command: xian-harness guard {change-id} --target <target-project> --for gate --json
        evidencePath: docs/xian-harness/changes/{change-id}/gate/gate-result.json
      archive:
        exitPhase: archived
        command: xian-harness guard {change-id} --target <target-project> --for archive --json
        evidencePath: docs/xian-harness/changes/{change-id}/archive/summary.md
# Authoritative protocol template registry for new change, docs, hook, agent,
# and evidence-sample contracts.
templateRegistry:
  change:
    full:
      proposal: .xian-harness/protocol/templates/change/full/proposal.md
      design: .xian-harness/protocol/templates/change/full/design.md
      tasks: .xian-harness/protocol/templates/change/full/tasks.md
      acceptanceCriteria: .xian-harness/protocol/templates/change/full/acceptance-criteria.md
      verify: .xian-harness/protocol/templates/change/full/verify.md
  docs:
    projectStatus: .xian-harness/protocol/templates/docs/project-status.md
    projectBaseline: .xian-harness/protocol/templates/docs/project-baseline.md
    projectDiscipline: .xian-harness/protocol/templates/docs/project-discipline.md
    goalRunbook: .xian-harness/protocol/templates/docs/goal-runbook.md
    requirement: .xian-harness/protocol/templates/docs/requirement.md
    todoList: .xian-harness/protocol/templates/docs/todo-list.md
    docSyncReport: .xian-harness/protocol/templates/docs/doc-sync-report.md
    decisionRecord: .xian-harness/protocol/templates/docs/decision-record.md
    exemplarCatalog: .xian-harness/protocol/templates/docs/exemplar-catalog.md
  hooks:
    hookContract: .xian-harness/protocol/templates/hooks/hook-contract.md
  agents:
    agentRoleContract: .xian-harness/protocol/templates/agents/agent-role-contract.md
  evidenceSamples:
    baseGolden:
      guide: .xian-harness/protocol/templates/evidence-samples/base-golden/README.md
      acceptanceCriteria: .xian-harness/protocol/templates/evidence-samples/base-golden/acceptance-criteria.md
      verifyResult: .xian-harness/protocol/templates/evidence-samples/base-golden/verify-result.json
      gateResult: .xian-harness/protocol/templates/evidence-samples/base-golden/gate-result.json
      workbenchSnapshot: .xian-harness/protocol/templates/evidence-samples/base-golden/workbench-snapshot.json
      archiveSummary: .xian-harness/protocol/templates/evidence-samples/base-golden/archive-summary.md
      experienceDisposition: .xian-harness/protocol/templates/evidence-samples/base-golden/experience-disposition.json
standardRegistry:
  qualityPolicy:
    kind: quality-policy
    sourcePath: .xian-harness/adapters/ruoyi/quality-policy.yaml
    ownerSkill: ruoyi-quality
    profile: ruoyi
    gateInput: registryLintSummary
    evidencePath: docs/xian-harness/changes/{change-id}/gate/registry-lint.json
  verificationRegistry:
    kind: verification-registry
    sourcePath: .xian-harness/adapters/ruoyi/quality-policy.yaml#verificationRegistry.rules
    ownerSkill: xian-verify
    profile: ruoyi
    gateInput: verificationRegistrySummary
    evidencePath: docs/xian-harness/changes/{change-id}/gate/gate-result.json
  skillRegistry:
    kind: skill-registry
    sourcePath: .xian-harness/skill-registry.json
    ownerSkill: xian-skill-governance
    profile: base
    gateInput: skillRegistrySummary
    evidencePath: docs/xian-harness/changes/{change-id}/gate/gate-result.json
  templateRegistry:
    kind: template-registry
    sourcePath: .xian-harness/harness-pack-manifest.yaml#templateRegistry
    ownerSkill: xian-pack-governance
    profile: base
    gateInput: templateRegistrySummary
    evidencePath: docs/xian-harness/changes/{change-id}/gate/gate-result.json
tools:
  cliPackage: xian-agent-harness
  cliCommand: xian-harness
  role: deterministic-support
profiles:
  base:
    description: 通用 Harness 治理 Profile，只安装 xian-* skills、通用 hooks、xian commands 和模板。
    includeSkillGroups:
      - governance
      - experience-governance
    includeCommandGroups:
      - governance
    activation:
      defaultForNonRuoyi: true
  typescript:
    description: TypeScript / Node 通用垂直 Profile，安装 base + TypeScript 项目入口规则和轻量 registry/bootstrap overlay。
    extends:
      - base
    includeSkillGroups:
      - governance
      - experience-governance
    includeCommandGroups:
      - governance
    activation:
      markers:
        - package.json
        - tsconfig.json
  python:
    description: Python 通用垂直 Profile，安装 base + Python 项目入口规则和轻量 registry/bootstrap overlay。
    extends:
      - base
    includeSkillGroups:
      - governance
      - experience-governance
    includeCommandGroups:
      - governance
    activation:
      markers:
        - pyproject.toml
        - requirements.txt
        - setup.py
        - setup.cfg
        - tox.ini
        - pytest.ini
  deployment-ops:
    description: Deployment / Ops 通用垂直 Profile，安装 base + 部署运维项目入口规则和轻量 registry/bootstrap overlay。
    extends:
      - base
    includeSkillGroups:
      - governance
      - experience-governance
    includeCommandGroups:
      - governance
    activation:
      markers:
        - Dockerfile
        - docker-compose.yml
        - compose.yaml
        - terraform/
        - k8s/
        - kubernetes/
        - helm/
        - Chart.yaml
  ruoyi:
    description: RuoYi Plus UniApp / Java Web 企业 CRUD 垂直 Profile，安装 base + RuoYi skills、commands 和原生工程经验。
    extends:
      - base
    includeSkillGroups:
      - governance
      - experience-governance
      - ruoyi
      - ruoyi-native
    includeCommandGroups:
      - governance
      - ruoyi
    activation:
      markers:
        - pom.xml
        - ruoyi-admin/
        - ruoyi-modules/
